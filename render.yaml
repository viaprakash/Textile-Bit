services:
  - type: web
    name: textile-bitmap-server
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: UPLOAD_DIR
        value: uploads
      - key: CLIENT_URL
        sync: false  # Set this in Render dashboard to your Vercel URL
